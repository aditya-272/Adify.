<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adify Pro Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0084ff; --bg: #000814; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.12); --danger: #ff3333; --success: #28a745; --popup-bg: rgba(10, 26, 47, 0.85); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at top right, #001f3f, var(--bg)); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 25px 20px 10px; display: flex; justify-content: space-between; align-items: center; z-index: 10; position: relative; }
        .logo { font-family: 'Syncopate', sans-serif; font-size: 18px; color: var(--primary); letter-spacing: 2px; cursor: pointer; }
        
        #searchToggleBtn { 
            position: absolute; left: 50%; transform: translateX(-50%);
            font-size: 20px; cursor: pointer; opacity: 0.8; padding: 8px; 
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        #searchToggleBtn:active { transform: translateX(-50%) scale(0.8); background: rgba(0, 132, 255, 0.2); opacity: 1; }

        .profile-btn { width: 35px; height: 35px; background: var(--glass); border: 1px solid var(--border); border-radius: 50%; overflow: hidden; cursor: pointer; }
        .profile-btn img { width: 100%; height: 100%; object-fit: cover; }

        #searchWrapper { 
            position: absolute; top: 80px; left: 20px; right: 20px; 
            background: rgba(10, 20, 35, 0.9); backdrop-filter: blur(20px); 
            border: 2px solid var(--primary); box-shadow: 0 0 20px rgba(0, 132, 255, 0.4);
            padding: 15px; border-radius: 22px; display: flex; align-items: center; gap: 10px;
            transform: translateY(-30px); opacity: 0; pointer-events: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2000;
        }
        #searchWrapper.open { transform: translateY(0); opacity: 1; pointer-events: all; }
        .search-bar { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 15px; border-radius: 14px; color: white; outline: none; font-size: 14px; }
        .search-back { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 12px; font-size: 11px; font-weight: bold; cursor: pointer; }

        .view { flex: 1; padding: 10px 20px; overflow-y: auto; display: none; padding-bottom: 160px; scroll-behavior: smooth; }
        .view.active { display: block; }
        .section-title { font-size: 10px; color: var(--primary); letter-spacing: 1px; margin: 15px 0 12px; text-transform: uppercase; font-weight: bold; }

        .playlist-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .card { background: var(--glass); border: 1px solid var(--border); padding: 10px; border-radius: 18px; text-align: center; cursor: pointer; }
        .card .art { width: 100%; aspect-ratio: 1; border-radius: 12px; margin-bottom: 10px; background-size: cover !important; }

        .song-item { display: flex; align-items: center; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 8px; position: relative; transition: 0.2s; }
        .playing-active { border-left: 3px solid var(--primary); background: rgba(0, 132, 255, 0.08); }
        .selected-to-remove { background: rgba(255, 51, 51, 0.15); border: 1px solid var(--danger); }
        .img-container { width: 42px; height: 42px; margin-right: 12px; }
        .song-img { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; }
        
        .more-btn { padding: 10px; font-size: 20px; opacity: 0.6; cursor: pointer; border-radius: 50%; transition: 0.2s; }
        .more-btn:active { background: rgba(0, 132, 255, 0.2); color: var(--primary); filter: drop-shadow(0 0 5px var(--primary)); }

        .menu-dropdown { 
            position: fixed; right: 20px; top: 50%; transform: translateY(-50%) scale(0.9); 
            background: var(--popup-bg); backdrop-filter: blur(25px); 
            border: 1px solid var(--primary); box-shadow: 0 10px 40px rgba(0, 132, 255, 0.3);
            border-radius: 20px; z-index: 3000; display: none; width: 240px; 
            opacity: 0; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .menu-dropdown.show { display: block; opacity: 1; transform: translateY(-50%) scale(1); }
        .menu-header { padding: 12px; border-bottom: 1px solid var(--border); font-size: 10px; text-align: center; color: var(--primary); font-weight: bold; }
        .menu-item { padding: 14px 18px; font-size: 13px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .menu-item:active { background: rgba(0, 132, 255, 0.1); box-shadow: inset 0 -4px 10px rgba(0, 132, 255, 0.2); }

        .playlist-actions { margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        .action-btn { width: 100%; padding: 12px; border-radius: 12px; font-size: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-remove-mode { background: rgba(255, 51, 51, 0.1); color: var(--danger); border: 1px solid rgba(255, 51, 51, 0.3); }
        .btn-confirm:active { box-shadow: 0 0 15px var(--success); }
        .btn-cancel:active { box-shadow: 0 0 15px var(--primary); }

        .player { position: fixed; bottom: 15px; left: 12px; right: 12px; background: rgba(10, 20, 35, 0.98); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 28px; padding: 18px 15px; z-index: 1000; }
        .player-main { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .player-info { display: flex; align-items: center; gap: 10px; width: 45%; }
        .player-art { width: 44px; height: 44px; border-radius: 8px; background-size: cover !important; border: 1px solid var(--border); }
        @keyframes djGlow { 0% { box-shadow: 0 0 15px 2px rgba(0, 132, 255, 0.7); } 50% { box-shadow: 0 0 25px 4px rgba(255, 51, 51, 0.8); } 100% { box-shadow: 0 0 15px 2px rgba(0, 132, 255, 0.7); } }
        .player-art.music-playing { animation: djGlow 3s infinite ease-in-out; }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 22px; flex: 1; }
        .nav-btn { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.7; transition: 0.2s; border-radius: 50%; }
        .nav-btn:active { transform: scale(0.85); opacity: 1; background: rgba(0, 132, 255, 0.2); filter: drop-shadow(0 0 8px var(--primary)); }
        
        .play-btn { width: 52px; height: 52px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0, 132, 255, 0.4); border: 1px solid rgba(255,255,255,0.1); }
        .play-btn:active { transform: scale(0.9); box-shadow: 0 0 20px var(--primary); }

        .time-container { margin-top: 5px; }
        .time-info { display: flex; justify-content: space-between; font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 4px; font-weight: 500; }
        .time-bar { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; position: relative; display: flex; align-items: center; }
        .fill { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; position: absolute; left: 0; top: 0; box-shadow: 0 0 10px var(--primary); }
        #seekSlider { width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 5; position: absolute; }
        
        #toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 20px; border-radius: 20px; font-size: 12px; opacity: 0; transition: 0.4s; z-index: 4000; }
        #toast.show { opacity: 1; bottom: 130px; }
        .watermark { position: fixed; bottom: 105px; right: 25px; font-size: 8px; color: var(--primary); opacity: 0.4; letter-spacing: 1px; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

    <audio id="mainAudio"></audio>
    <div id="toast">Playlist Updated!</div>
    <div class="watermark">Made by Aditya</div>

    <header>
        <div class="logo" onclick="resetToHome()">ADIFY</div>
        <div id="searchToggleBtn" onclick="toggleSearchBar(event)">🔍</div>
        <div class="profile-btn" onclick="alert('Profile Open')">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100" alt="User">
        </div>
    </header>

    <div id="searchWrapper" onclick="event.stopPropagation()">
        <input type="text" class="search-bar" id="searchInput" placeholder="Search track..." oninput="handleSearch()">
        <button class="search-back" onclick="closeSearch()">BACK</button>
    </div>

    <div class="menu-dropdown" id="globalPopup" onclick="event.stopPropagation()">
        <div class="menu-header">ADD TO PLAYLIST</div>
        <div id="playlistOptions"></div>
    </div>

    <div id="homeView" class="view active">
        <p class="section-title">Playlists</p>
        <div class="playlist-grid" id="mainPlaylistGrid"></div>
        <p class="section-title">Tracks</p>
        <div id="singleTracksContainer"></div>
    </div>

    <div id="playlistView" class="view">
        <div style="margin-bottom:20px;"><button style="background:var(--glass); color:white; border:1px solid var(--border); padding:10px 18px; border-radius:10px; font-size:11px;" onclick="resetToHome()">🏠 HOME</button></div>
        <h2 id="playlistTitle" style="font-size:24px; margin-bottom:15px; color:var(--primary);"></h2>
        
        <div class="playlist-actions">
            <button id="modeBtn" class="action-btn btn-remove-mode" onclick="enableSelectionMode()">Select songs to remove</button>
            <button id="confirmBtn" class="action-btn" style="display:none; background:var(--success); color:white; border:none;" onclick="confirmRemoval()">Confirm Remove Selected</button>
            <button id="cancelBtn" class="action-btn" style="display:none; background:var(--glass); color:white; border:1px solid var(--border);" onclick="disableSelectionMode()">Cancel</button>
        </div>

        <div id="songsContainer"></div>
    </div>

    <footer class="player">
        <div class="player-main">
            <div class="player-info">
                <div class="player-art" id="playerImgArt"></div>
                <div style="overflow:hidden;"><h4 id="pTitle" style="font-size:11px; white-space:nowrap;">Select a song</h4><p id="pArtist" style="font-size:9px; color:var(--primary);">---</p></div>
            </div>
            <div class="controls">
                <div class="nav-btn" onclick="prevTrack()"><svg viewBox="0 0 24 24" width="22" fill="white"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></div>
                <div class="play-btn" id="playBtn" onclick="togglePlay()"><svg id="playIcon" viewBox="0 0 24 24" width="22" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
                <div class="nav-btn" onclick="nextTrack()"><svg viewBox="0 0 24 24" width="22" fill="white"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></div>
            </div>
        </div>
        <div class="time-container">
            <div class="time-info"><span id="currentTime">0:00</span><span id="totalDuration">0:00</span></div>
            <div class="time-bar">
                <div class="fill" id="fill"></div>
                <input type="range" id="seekSlider" min="0" max="1000" value="0" oninput="handleSeekInput()" onchange="handleSeekChange()">
            </div>
        </div>
    </footer>

    <script>
        const audio = document.getElementById('mainAudio');
        let currentUrl = "", searchQuery = "", activeP = null, isDragging = false, isSelectionMode = false, currentTrackData = null, selectedSongs = new Set();
        const userPlaylists = { "Lo-Fi Sleep 😴": [], "Study Focus 📖": [], "Traveling ✈️": [], "My Playlist 💖": [] };
        const allSongs = [{ id: 1, title: "Udariyan", artist: "Aditya", url: "https://www.image2url.com/r2/default/audio/1778420635219-a057d459-d0af-413e-bd2f-5f148740396c.mp3", image: "https://files.catbox.moe/0j9stc.jpeg" }, { id: 2, title: "Night Vibes", artist: "Lofi Beats", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", image: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=400" }];
        const playlistsData = [{ name: 'Lo-Fi Sleep 😴', img: 'https://files.catbox.moe/0j9stc.jpeg' }, { name: 'Study Focus 📖', img: 'https://files.catbox.moe/t07xmg.jpeg' }, { name: 'Traveling ✈️', img: 'https://files.catbox.moe/pzdmjo.jpeg' }, { name: 'My Playlist 💖', img: 'https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=300' }];

        function handleGlobalClick() { document.getElementById('globalPopup').classList.remove('show'); const w = document.getElementById('searchWrapper'); if (w.classList.contains('open')) w.classList.remove('open'); }
        function toggleSearchBar(e) { e.stopPropagation(); const w = document.getElementById('searchWrapper'); w.classList.toggle('open'); }
        function handleSearch() { searchQuery = document.getElementById('searchInput').value.toLowerCase(); renderAll(); }
        function closeSearch() { searchQuery = ""; document.getElementById('searchInput').value = ""; document.getElementById('searchWrapper').classList.remove('open'); renderAll(); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function formatTime(s) { if(!s) return "0:00"; let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }

        function openMenu(e, id) {
            e.stopPropagation(); const popup = document.getElementById('globalPopup');
            document.getElementById('playlistOptions').innerHTML = playlistsData.map(p => {
                const ex = userPlaylists[p.name].some(x => x.id === id);
                return `<div class="menu-item" onclick="playlistAction(${id}, '${p.name}', ${ex})"><span>${p.name}</span><span style="color:${ex ? 'var(--danger)' : 'var(--primary)'}; font-weight:bold;">${ex ? 'REMOVE' : 'ADD'}</span></div>`;
            }).join(''); popup.classList.add('show');
        }

        function playlistAction(id, pN, ex) {
            if(ex) userPlaylists[pN] = userPlaylists[pN].filter(s => s.id !== id);
            else userPlaylists[pN].push(allSongs.find(s => s.id === id));
            showToast(ex ? "Removed!" : "Added!"); document.getElementById('globalPopup').classList.remove('show'); refreshView();
        }

        function songItemTemplate(s) {
            const isP = currentUrl === s.url, isS = selectedSongs.has(s.id);
            return `<div class="song-item ${isP ? 'playing-active' : ''} ${isS ? 'selected-to-remove' : ''}" onclick="${isSelectionMode ? `toggleSelectSong(${s.id})` : `playSong('${s.title}','${s.artist}','${s.url}','${s.image}')`}"><div style="display:flex; align-items:center; flex:1"><div class="img-container"><img src="${s.image}" class="song-img"></div><div style="overflow:hidden; flex:1"><h4>${s.title}</h4><p style="font-size:10px; opacity:0.5">${s.artist}</p></div></div>${!isSelectionMode ? `<div class="more-btn" onclick="openMenu(event, ${s.id})">⋮</div>` : `<div style="color:var(--danger); font-weight:bold; margin-right:10px;">${isS ? '✓' : ''}</div>`}</div>`;
        }

        function renderAll() {
            document.getElementById('mainPlaylistGrid').innerHTML = playlistsData.filter(p => p.name.toLowerCase().includes(searchQuery)).map(p => `<div class="card" onclick="openPlaylist('${p.name}')"><div class="art" style="background: url('${p.img}');"></div><p style="font-size:10px;">${p.name}</p></div>`).join('');
            document.getElementById('singleTracksContainer').innerHTML = allSongs.filter(s => s.title.toLowerCase().includes(searchQuery)).map(s => songItemTemplate(s)).join('');
        }

        function playSong(t, a, u, i) {
            currentTrackData = { title: t, artist: a, url: u, image: i }; currentUrl = u; audio.src = u; audio.play();
            document.getElementById('pTitle').innerText = t; document.getElementById('pArtist').innerText = a;
            const art = document.getElementById('playerImgArt'); art.style.background = `url('${i}')`; art.classList.add('music-playing');
            document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; refreshView();
        }

        function togglePlay() { 
            if(!audio.src) return; 
            const art = document.getElementById('playerImgArt');
            if(audio.paused) { audio.play(); document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; art.classList.add('music-playing'); } 
            else { audio.pause(); document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>'; art.classList.remove('music-playing'); } 
        }

        function handleSeekInput() { if(!audio.duration) return; isDragging = true; const s = document.getElementById('seekSlider'); document.getElementById('fill').style.width = (s.value / s.max) * 100 + '%'; document.getElementById('currentTime').innerText = formatTime(audio.duration * (s.value / 1000)); }
        function handleSeekChange() { if(!audio.duration) return; audio.currentTime = audio.duration * (document.getElementById('seekSlider').value / 1000); isDragging = false; }

        audio.ontimeupdate = () => { if (!isDragging && audio.duration) { const p = (audio.currentTime/audio.duration)*100; document.getElementById('fill').style.width = p+'%'; document.getElementById('seekSlider').value = p*10; document.getElementById('currentTime').innerText = formatTime(audio.currentTime); document.getElementById('totalDuration').innerText = formatTime(audio.duration); } };
        
        function openPlaylist(n) { activeP = n; document.getElementById('homeView').classList.remove('active'); document.getElementById('playlistView').classList.add('active'); document.getElementById('playlistTitle').innerText = n; document.getElementById('searchToggleBtn').style.display = 'none'; renderPlaylistSongs(); }
        function resetToHome() { activeP = null; document.getElementById('playlistView').classList.remove('active'); document.getElementById('homeView').classList.add('active'); document.getElementById('searchToggleBtn').style.display = 'flex'; renderAll(); }
        
        function enableSelectionMode() { isSelectionMode = true; selectedSongs.clear(); document.getElementById('modeBtn').style.display='none'; document.getElementById('confirmBtn').style.display='block'; document.getElementById('cancelBtn').style.display='block'; renderPlaylistSongs(); }
        function disableSelectionMode() { isSelectionMode = false; selectedSongs.clear(); document.getElementById('modeBtn').style.display='block'; document.getElementById('confirmBtn').style.display='none'; document.getElementById('cancelBtn').style.display='none'; renderPlaylistSongs(); }
        function toggleSelectSong(id) { selectedSongs.has(id) ? selectedSongs.delete(id) : selectedSongs.add(id); renderPlaylistSongs(); }
        function confirmRemoval() { userPlaylists[activeP] = userPlaylists[activeP].filter(s => !selectedSongs.has(s.id)); showToast("Songs Removed!"); disableSelectionMode(); }

        function renderPlaylistSongs() { let list = userPlaylists[activeP] || []; document.getElementById('songsContainer').innerHTML = list.length ? list.map(s => songItemTemplate(s)).join('') : "<p style='text-align:center; opacity:0.3; padding:20px;'>Empty.</p>"; }
        function refreshView() { if(activeP) renderPlaylistSongs(); else renderAll(); }
        
        function nextTrack() { const r = allSongs[Math.floor(Math.random() * allSongs.length)]; playSong(r.title, r.artist, r.url, r.image); }
        function prevTrack() { nextTrack(); }

        window.onload = renderAll;
    </script>
</body>
</html>
